name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: cargo test
      - run: cargo clippy
      - run: cargo fmt --check

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@91534edaf9fd796a162759d80d49cdff574bff2c # cargo-llvm-cov
      - name: Generate Cobertura coverage report
        run: cargo llvm-cov --workspace --cobertura --output-path coverage.xml
      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1
        with:
          file: coverage.xml
          language: Rust
          label: code-coverage/cargo-llvm-cov
          fail-on-error: false
      - name: Write coverage summary
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          python <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()
          coverage_line_rate = float(root.attrib.get("line-rate", "0"))
          covered_lines = int(root.attrib.get("lines-covered", "0"))
          valid_lines = int(root.attrib.get("lines-valid", "0"))
          coverage_percent = coverage_line_rate * 100

          with open("coverage-comment.md", "w", encoding="utf-8") as file:
              file.write("## Coverage summary\n\n")
              file.write("| Metric | Value |\n")
              file.write("| --- | ---: |\n")
              file.write(f"| Line coverage | {coverage_percent:.2f}% |\n")
              file.write(f"| Covered lines | {covered_lines} / {valid_lines} |\n")
          PY
      - name: Comment coverage summary
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: gh pr comment "$PR_NUMBER" --edit-last --create-if-none --body-file coverage-comment.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
