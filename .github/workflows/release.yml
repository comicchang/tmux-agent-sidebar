name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: tmux-agent-sidebar-darwin-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: tmux-agent-sidebar-darwin-x86_64
          - target: x86_64-unknown-linux-gnu.2.17
            os: ubuntu-latest
            asset: tmux-agent-sidebar-linux-x86_64
            use_zigbuild: true
          - target: aarch64-unknown-linux-gnu.2.17
            os: ubuntu-latest
            asset: tmux-agent-sidebar-linux-aarch64
            use_zigbuild: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        if: ${{ !matrix.use_zigbuild }}
        run: rustup target add ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: ${{ matrix.use_zigbuild }}
        run: cargo install cargo-zigbuild

      - name: Build (zigbuild, glibc 2.17+)
        if: ${{ matrix.use_zigbuild }}
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          TARGET_DIR="${{ matrix.target }}"
          cp target/$TARGET_DIR/release/tmux-agent-sidebar ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${{ github.ref_name }})
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${{ github.ref_name }}")
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: tmux-agent-sidebar-*
